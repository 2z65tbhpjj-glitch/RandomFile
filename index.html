<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Internet Archive Downloader</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #fff;
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100vh;
  gap: 20px;
  padding: 40px 20px;
}
#btn {
  width: 200px;
  height: 200px;
  border: none;
  background: transparent;
  cursor: pointer;
  transition: transform 0.12s ease;
  padding: 0;
}
#btn:active { transform: scale(0.9); }
#btn img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
#btn:disabled { opacity: 0.4; cursor: not-allowed; }
#status {
  font-size: 16px;
  color: #888;
  text-align: center;
  min-height: 24px;
}
#status.working { color: #4fc3f7; }
#status.success { color: #81c784; }
#status.error { color: #e57373; }
#preview {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  background: #141414;
  border: 1px solid #2a2a2a;
  border-radius: 10px;
  padding: 20px 30px;
  max-width: 600px;
  width: 90%;
}
#preview.active { display: flex; }
#preview .filename {
  color: #4fc3f7;
  font-size: 15px;
  word-break: break-all;
  text-align: center;
}
#preview .meta {
  color: #666;
  font-size: 13px;
}
#dlBtn {
  background: #4fc3f7;
  color: #0a0a0a;
  border: none;
  border-radius: 6px;
  padding: 10px 28px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s ease;
}
#dlBtn:hover { background: #29b6f6; }
#dlBtn:active { transform: scale(0.96); }
#queue {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-width: 800px;
  width: 95%;
  max-height: 40vh;
  overflow-y: auto;
}
#queue .item {
  background: #141414;
  border: 1px solid #2a2a2a;
  border-radius: 6px;
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
#queue .item span {
  color: #4fc3f7;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 75%;
}
#queue .item .meta { color: #555; font-size: 11px; flex-shrink: 0; margin-left: 10px; }
#count { color: #444; font-size: 12px; }
#warning {
  color: #444;
  font-size: 11px;
  margin-top: 30px;
  text-align: center;
}
h1 { font-size: 20px; font-weight: 400; letter-spacing: 1px; color: #bbb; }
</style>
</head>
<body>
<h1>Random Internet Archive File</h1>
<button id="btn"><img src="https://files.catbox.moe/wmid31.png" alt="Scan"></button>
<div id="status">Click to scan for a random file</div>
<div id="preview">
  <div class="filename" id="pName"></div>
  <div class="meta" id="pMeta"></div>
  <button id="dlBtn">Download</button>
</div>
<div id="count"></div>
<div id="queue"></div>
<div id="warning">Be careful what you download</div>

<script>
const btn = document.getElementById('btn');
const statusEl = document.getElementById('status');
const previewEl = document.getElementById('preview');
const pNameEl = document.getElementById('pName');
const pMetaEl = document.getElementById('pMeta');
const dlBtn = document.getElementById('dlBtn');
const queueEl = document.getElementById('queue');
const countEl = document.getElementById('count');
let totalDownloaded = 0;
let currentUrl = '';
let currentName = '';
let currentSize = 0;

function setStatus(msg, cls) { statusEl.textContent = msg; statusEl.className = cls || ''; }

function addQueue(name, size) {
  const div = document.createElement('div');
  div.className = 'item';
  const sizeStr = size > 1e9 ? (size/1e9).toFixed(2)+' GB' : size > 1e6 ? (size/1e6).toFixed(2)+' MB' : size > 1e3 ? (size/1e3).toFixed(1)+' KB' : size+' B';
  div.innerHTML = `<span>${name}</span><span class="meta">${sizeStr}</span>`;
  queueEl.prepend(div);
  totalDownloaded++;
  countEl.textContent = `${totalDownloaded} downloaded`;
}

function triggerDownload(url) {
  window.open(url, '_blank');
}

function isJunk(item) {
  const id = (item.identifier || '').toLowerCase();
  const title = (item.title || '').toLowerCase();
  return id.startsWith('archiveit-') ||
         id.startsWith('daily-job-') ||
         title.includes('archive-it') ||
         title.includes('daily job') ||
         title.includes('crawl job') ||
         title.includes('archiveit');
}

function isMetaFile(name) {
  const n = name.toLowerCase();
  return n.endsWith('.xml') || n.endsWith('.meta') || n.endsWith('.txt') ||
         n.endsWith('.json') || n.endsWith('.html') || n.endsWith('.jpg') ||
         n.endsWith('.png') || n.endsWith('.gif') || n.endsWith('.css') ||
         n.endsWith('.js') || n.endsWith('.md') || n.endsWith('.sqlite');
}

async function scan() {
  btn.disabled = true;
  previewEl.classList.remove('active');
  setStatus('Scanning...', 'working');

  try {
    const page = Math.floor(Math.random() * 1000) + 1;
    const searchRes = await fetch(`https://archive.org/advancedsearch.php?q=*&rows=20&fl=identifier,title&page=${page}&output=json`);
    const searchData = await searchRes.json();
    const items = (searchData.response.docs || []).filter(i => !isJunk(i));
    if (items.length === 0) throw new Error('No items');

    const item = items[Math.floor(Math.random() * items.length)];
    const metaRes = await fetch(`https://archive.org/metadata/${item.identifier}`);
    const meta = await metaRes.json();
    if (!meta.files || meta.files.length === 0) throw new Error('No files');

    const pool = meta.files.filter(f => !isMetaFile(f.name));
    if (pool.length === 0) throw new Error('No valid files');

    const file = pool[Math.floor(Math.random() * pool.length)];
    currentUrl = `https://archive.org/download/${item.identifier}/${file.name}`;
    currentName = file.name;
    currentSize = file.size || 0;

    const sizeStr = currentSize > 1e9 ? (currentSize/1e9).toFixed(2)+' GB' : currentSize > 1e6 ? (currentSize/1e6).toFixed(2)+' MB' : currentSize > 1e3 ? (currentSize/1e3).toFixed(1)+' KB' : currentSize+' B';
    pNameEl.textContent = file.name;
    pMetaEl.textContent = `From: ${item.title || item.identifier} | Size: ${sizeStr}`;
    previewEl.classList.add('active');
    setStatus('File found', 'success');
  } catch (e) {
    setStatus('Failed', 'error');
  } finally {
    btn.disabled = false;
  }
}

function doDownload() {
  triggerDownload(currentUrl);
  addQueue(currentName, currentSize);
  previewEl.classList.remove('active');
  setStatus('Downloaded', 'success');
}

btn.addEventListener('click', scan);
dlBtn.addEventListener('click', doDownload);
</script>
</body>
</html>
